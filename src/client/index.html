<!DOCTYPE html>
<html lang="en" data-theme="dark" style="background:#111113">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
  <title>Copilot Bridge</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#09090b" />
  <!-- Prevent flash: apply cached theme before React hydrates -->
  <script>
    try {
      // Derive API base from path — matches staging preview paths like /staging/<prefix>/
      const pathParts = location.pathname.split('/').filter(Boolean);
      const base = (pathParts.length >= 2 && pathParts[0] === 'staging') ? '/' + pathParts.slice(0, 2).join('/') : '';
      fetch(base+'/api/settings').then(r=>r.json()).then(s=>{
        const p=s.theme||'dark';
        const t=p==='system'
          ? (matchMedia('(prefers-color-scheme:light)').matches?'light':'dark')
          : p;
        document.documentElement.setAttribute('data-theme',t);
        document.documentElement.style.background=t==='light'?'#f8f8fa':'#111113';
        const m=document.querySelector('meta[name=theme-color]');
        if(m)m.content=t==='light'?'#ffffff':'#09090b';
      }).catch(()=>{});
    } catch(e){}
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/main.tsx"></script>
</body>
</html>
