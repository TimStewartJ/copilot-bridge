name: Preview Release

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:
    inputs:
      publish_prerelease:
        description: "Update the rolling latest-preview GitHub prerelease."
        required: true
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preview:
    name: Build preview package
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        shell: pwsh
        run: npm ci

      - name: Resolve preview metadata
        shell: pwsh
        run: |
          $packageVersion = (Get-Content package.json -Raw | ConvertFrom-Json).version
          $shortSha = $env:GITHUB_SHA.Substring(0, 7)
          $version = "$packageVersion-preview.${{ github.run_number }}.${{ github.run_attempt }}.g$shortSha"

          "PREVIEW_VERSION=$version" >> $env:GITHUB_ENV
          "PREVIEW_CHANNEL=preview" >> $env:GITHUB_ENV
          "PREVIEW_PLATFORM=win-x64" >> $env:GITHUB_ENV
          "PREVIEW_IMMUTABLE_TAG=preview-$version" >> $env:GITHUB_ENV
          "PREVIEW_POINTER_TAG=latest-preview" >> $env:GITHUB_ENV

      - name: Validate update manifest signing config
        shell: pwsh
        env:
          BRIDGE_UPDATE_MANIFEST_PRIVATE_KEY_PEM: ${{ secrets.BRIDGE_UPDATE_MANIFEST_PRIVATE_KEY_PEM }}
          BRIDGE_UPDATE_MANIFEST_PRIVATE_KEY_BASE64: ${{ secrets.BRIDGE_UPDATE_MANIFEST_PRIVATE_KEY_BASE64 }}
          BRIDGE_UPDATE_MANIFEST_PUBLIC_KEY_PEM: ${{ vars.BRIDGE_UPDATE_MANIFEST_PUBLIC_KEY_PEM || secrets.BRIDGE_UPDATE_MANIFEST_PUBLIC_KEY_PEM }}
          BRIDGE_UPDATE_MANIFEST_PUBLIC_KEY_BASE64: ${{ vars.BRIDGE_UPDATE_MANIFEST_PUBLIC_KEY_BASE64 || secrets.BRIDGE_UPDATE_MANIFEST_PUBLIC_KEY_BASE64 }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:BRIDGE_UPDATE_MANIFEST_PRIVATE_KEY_PEM) -and [string]::IsNullOrWhiteSpace($env:BRIDGE_UPDATE_MANIFEST_PRIVATE_KEY_BASE64)) {
            throw "Missing update manifest signing private key. Configure BRIDGE_UPDATE_MANIFEST_PRIVATE_KEY_PEM or BRIDGE_UPDATE_MANIFEST_PRIVATE_KEY_BASE64 as a GitHub secret."
          }
          if ([string]::IsNullOrWhiteSpace($env:BRIDGE_UPDATE_MANIFEST_PUBLIC_KEY_PEM) -and [string]::IsNullOrWhiteSpace($env:BRIDGE_UPDATE_MANIFEST_PUBLIC_KEY_BASE64)) {
            throw "Missing update manifest public key. Configure BRIDGE_UPDATE_MANIFEST_PUBLIC_KEY_PEM or BRIDGE_UPDATE_MANIFEST_PUBLIC_KEY_BASE64 as a GitHub Actions variable or secret."
          }

      - name: Typecheck
        shell: pwsh
        run: npx tsc --noEmit

      - name: Cross-platform test audit
        shell: pwsh
        run: npm run test:xplat-audit

      - name: Build client
        shell: pwsh
        run: npx vite build

      - name: Run tests
        shell: pwsh
        run: npx vitest run

      - name: Build preview package
        shell: pwsh
        env:
          BRIDGE_UPDATE_MANIFEST_PUBLIC_KEY_PEM: ${{ vars.BRIDGE_UPDATE_MANIFEST_PUBLIC_KEY_PEM || secrets.BRIDGE_UPDATE_MANIFEST_PUBLIC_KEY_PEM }}
          BRIDGE_UPDATE_MANIFEST_PUBLIC_KEY_BASE64: ${{ vars.BRIDGE_UPDATE_MANIFEST_PUBLIC_KEY_BASE64 || secrets.BRIDGE_UPDATE_MANIFEST_PUBLIC_KEY_BASE64 }}
        run: |
          pwsh -NoProfile -File .\scripts\package-release.ps1 `
            -Version $env:PREVIEW_VERSION `
            -Channel $env:PREVIEW_CHANNEL `
            -Platform $env:PREVIEW_PLATFORM `
            -IncludeNodeModules `
            -Analyze `
            -SmokeTest

      - name: Write preview notes
        shell: pwsh
        run: |
          $notesPath = Join-Path "release" "preview-notes.md"
          @(
            "# Copilot Bridge Preview $env:PREVIEW_VERSION",
            "",
            "Channel: $env:PREVIEW_CHANNEL",
            "Commit: $env:GITHUB_SHA",
            "Workflow run: $env:GITHUB_SERVER_URL/$env:GITHUB_REPOSITORY/actions/runs/$env:GITHUB_RUN_ID",
            "Immutable release: $env:GITHUB_SERVER_URL/$env:GITHUB_REPOSITORY/releases/tag/$env:PREVIEW_IMMUTABLE_TAG",
            "",
            "This is an automatically generated preview build from the latest mainline update.",
            "Preview builds are installable, but they are not stable releases.",
            "",
            "## Install",
            "",
            "Run this in PowerShell:",
            "",
            "``````powershell",
            "irm https://github.com/$env:GITHUB_REPOSITORY/releases/download/latest-preview/install-preview.ps1 | iex",
            "``````",
            "",
            "The installer downloads the signed preview manifest, verifies the manifest signature, downloads the immutable preview package, verifies its SHA256, installs Bridge, and starts it."
          ) | Set-Content -Path $notesPath -Encoding UTF8

      - name: Write signed preview manifest
        shell: pwsh
        env:
          BRIDGE_UPDATE_MANIFEST_PRIVATE_KEY_PEM: ${{ secrets.BRIDGE_UPDATE_MANIFEST_PRIVATE_KEY_PEM }}
          BRIDGE_UPDATE_MANIFEST_PRIVATE_KEY_BASE64: ${{ secrets.BRIDGE_UPDATE_MANIFEST_PRIVATE_KEY_BASE64 }}
        run: |
          $zip = "release/copilot-bridge-$env:PREVIEW_VERSION-$env:PREVIEW_CHANNEL-$env:PREVIEW_PLATFORM.zip"
          $packageName = Split-Path -Leaf $zip
          $manifest = "release/$env:PREVIEW_CHANNEL-$env:PREVIEW_PLATFORM.manifest.json"
          $signature = "$manifest.sig"
          $releaseUrl = "https://github.com/$env:GITHUB_REPOSITORY/releases/tag/$env:PREVIEW_IMMUTABLE_TAG"
          $packageUrl = "https://github.com/$env:GITHUB_REPOSITORY/releases/download/$env:PREVIEW_IMMUTABLE_TAG/$packageName"

          node .\scripts\write-update-manifest.mjs `
            --version $env:PREVIEW_VERSION `
            --channel $env:PREVIEW_CHANNEL `
            --platform $env:PREVIEW_PLATFORM `
            --source-commit $env:GITHUB_SHA `
            --package-path $zip `
            --package-url $packageUrl `
            --release-url $releaseUrl `
            --release-notes-url $releaseUrl `
            --output $manifest `
            --signature-output $signature

      - name: Prepare latest preview aliases
        shell: pwsh
        env:
          BRIDGE_UPDATE_MANIFEST_PUBLIC_KEY_PEM: ${{ vars.BRIDGE_UPDATE_MANIFEST_PUBLIC_KEY_PEM || secrets.BRIDGE_UPDATE_MANIFEST_PUBLIC_KEY_PEM }}
          BRIDGE_UPDATE_MANIFEST_PUBLIC_KEY_BASE64: ${{ vars.BRIDGE_UPDATE_MANIFEST_PUBLIC_KEY_BASE64 || secrets.BRIDGE_UPDATE_MANIFEST_PUBLIC_KEY_BASE64 }}
        run: |
          $zip = "release/copilot-bridge-$env:PREVIEW_VERSION-$env:PREVIEW_CHANNEL-$env:PREVIEW_PLATFORM.zip"
          $aliasZip = "release/copilot-bridge-$env:PREVIEW_CHANNEL-$env:PREVIEW_PLATFORM.zip"
          Copy-Item -Path $zip -Destination $aliasZip -Force

          if (-not [string]::IsNullOrWhiteSpace($env:BRIDGE_UPDATE_MANIFEST_PUBLIC_KEY_PEM)) {
            $publicKeyPem = $env:BRIDGE_UPDATE_MANIFEST_PUBLIC_KEY_PEM.Trim()
          } elseif (-not [string]::IsNullOrWhiteSpace($env:BRIDGE_UPDATE_MANIFEST_PUBLIC_KEY_BASE64)) {
            $publicKeyPem = [System.Text.Encoding]::UTF8.GetString([System.Convert]::FromBase64String($env:BRIDGE_UPDATE_MANIFEST_PUBLIC_KEY_BASE64.Trim())).Trim()
          } else {
            throw "Missing update manifest public key for install-preview.ps1."
          }

          $installerTemplate = Get-Content -Path "scripts/install-preview.ps1" -Raw
          $installerTemplate.Replace("__BRIDGE_UPDATE_MANIFEST_PUBLIC_KEY_PEM__", $publicKeyPem) |
            Set-Content -Path "release/install-preview.ps1" -Encoding UTF8

      - name: Upload preview workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: copilot-bridge-preview-${{ env.PREVIEW_VERSION }}-${{ env.PREVIEW_PLATFORM }}
          path: |
            release/copilot-bridge-${{ env.PREVIEW_VERSION }}-${{ env.PREVIEW_CHANNEL }}-${{ env.PREVIEW_PLATFORM }}.zip
            release/copilot-bridge-${{ env.PREVIEW_VERSION }}-${{ env.PREVIEW_CHANNEL }}-${{ env.PREVIEW_PLATFORM }}.zip.sha256
            release/copilot-bridge-${{ env.PREVIEW_VERSION }}-${{ env.PREVIEW_CHANNEL }}-${{ env.PREVIEW_PLATFORM }}.analysis.json
            release/copilot-bridge-${{ env.PREVIEW_CHANNEL }}-${{ env.PREVIEW_PLATFORM }}.zip
            release/install-preview.ps1
            release/${{ env.PREVIEW_CHANNEL }}-${{ env.PREVIEW_PLATFORM }}.manifest.json
            release/${{ env.PREVIEW_CHANNEL }}-${{ env.PREVIEW_PLATFORM }}.manifest.json.sig
            release/preview-notes.md
          if-no-files-found: error

      - name: Publish immutable preview prerelease
        if: ${{ (github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')) || (github.event_name == 'workflow_dispatch' && inputs.publish_prerelease == true && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')) }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $zip = "release/copilot-bridge-$env:PREVIEW_VERSION-$env:PREVIEW_CHANNEL-$env:PREVIEW_PLATFORM.zip"
          $sha = "$zip.sha256"
          $analysis = "release/copilot-bridge-$env:PREVIEW_VERSION-$env:PREVIEW_CHANNEL-$env:PREVIEW_PLATFORM.analysis.json"
          $manifest = "release/$env:PREVIEW_CHANNEL-$env:PREVIEW_PLATFORM.manifest.json"
          $signature = "$manifest.sig"
          $notes = "release/preview-notes.md"
          $tag = $env:PREVIEW_IMMUTABLE_TAG

          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            throw "Immutable preview release $tag already exists. Refusing to overwrite published preview assets."
          }

          gh release create $tag `
            $zip `
            $sha `
            $analysis `
            $manifest `
            $signature `
            --prerelease `
            --target $env:GITHUB_SHA `
            --title "Copilot Bridge Preview $env:PREVIEW_VERSION" `
            --notes-file $notes
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to create immutable preview prerelease $tag."
          }

      - name: Publish latest preview pointer
        if: ${{ (github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')) || (github.event_name == 'workflow_dispatch' && inputs.publish_prerelease == true && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')) }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $aliasZip = "release/copilot-bridge-$env:PREVIEW_CHANNEL-$env:PREVIEW_PLATFORM.zip"
          $installer = "release/install-preview.ps1"
          $manifest = "release/$env:PREVIEW_CHANNEL-$env:PREVIEW_PLATFORM.manifest.json"
          $signature = "$manifest.sig"
          $notes = "release/preview-notes.md"
          $tag = $env:PREVIEW_POINTER_TAG

          function Test-ReleaseAsset([string]$Tag, [string]$AssetName) {
            $releaseJson = gh release view $Tag --json assets
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to read $Tag release assets."
            }
            $release = $releaseJson | ConvertFrom-Json
            return @($release.assets | Where-Object { $_.name -eq $AssetName }).Count -gt 0
          }

          function Upload-ReleaseAsset([string]$Tag, [string]$Path, [string]$Description) {
            $assetName = Split-Path -Leaf $Path
            for ($attempt = 1; $attempt -le 3; $attempt++) {
              gh release upload $Tag $Path --clobber
              if ($LASTEXITCODE -eq 0 -and (Test-ReleaseAsset $Tag $assetName)) {
                return
              }
              if (Test-ReleaseAsset $Tag $assetName) {
                Write-Warning "Upload of $Description reported failure, but $assetName exists on $Tag."
                return
              }
              if ($attempt -lt 3) {
                Write-Warning "Failed to upload $Description to $Tag on attempt $attempt. Retrying..."
                Start-Sleep -Seconds (5 * $attempt)
              }
            }
            throw "Failed to upload $Description to $Tag."
          }

          git tag -f $tag $env:GITHUB_SHA
          git push -f origin "refs/tags/$tag"
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to update $tag git tag."
          }

          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release edit $tag `
              --prerelease `
              --target $env:GITHUB_SHA `
              --title "Copilot Bridge Latest Preview" `
              --notes-file $notes
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to update $tag prerelease metadata."
            }

            Upload-ReleaseAsset $tag $aliasZip "package alias"
            Upload-ReleaseAsset $tag $installer "installer"
            Upload-ReleaseAsset $tag $signature "manifest signature"
            Upload-ReleaseAsset $tag $manifest "manifest"
          } else {
            gh release create $tag `
              $aliasZip `
              $installer `
              $signature `
              $manifest `
              --prerelease `
              --target $env:GITHUB_SHA `
              --title "Copilot Bridge Latest Preview" `
              --notes-file $notes
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to create $tag prerelease pointer."
            }
          }

      - name: Prune old immutable preview prereleases
        if: ${{ (github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')) || (github.event_name == 'workflow_dispatch' && inputs.publish_prerelease == true && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')) }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $retentionCount = 10
          $retentionDays = 7
          $cutoff = (Get-Date).ToUniversalTime().AddDays(-$retentionDays)
          $releases = @(gh release list --limit 200 --json tagName,isPrerelease,publishedAt | ConvertFrom-Json)
          $previewReleases = @(
            $releases |
              Where-Object { $_.tagName -like "preview-*" -and $_.isPrerelease -eq $true } |
              Sort-Object { [DateTimeOffset]::Parse($_.publishedAt).UtcDateTime } -Descending
          )

          for ($index = $retentionCount; $index -lt $previewReleases.Count; $index++) {
            $release = $previewReleases[$index]
            $publishedAt = [DateTimeOffset]::Parse($release.publishedAt).UtcDateTime
            if ($publishedAt -ge $cutoff) {
              continue
            }

            gh release delete $release.tagName --yes --cleanup-tag
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to delete old immutable preview prerelease $($release.tagName)."
            }
          }
