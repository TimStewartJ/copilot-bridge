name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - main
  schedule:
    - cron: "17 7 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        shell: pwsh
        run: npm ci

      - name: Typecheck
        shell: pwsh
        run: npx tsc --noEmit

      - name: Cross-platform test audit
        shell: pwsh
        run: npm run test:xplat-audit

      - name: Build client
        shell: pwsh
        run: npx vite build

      - name: Run tests with coverage
        shell: pwsh
        run: npm run test:coverage

      - name: Write coverage summary
        if: always()
        shell: pwsh
        run: node .\scripts\write-coverage-summary.mjs coverage\coverage-summary.json

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ github.run_id }}-${{ github.run_attempt }}
          path: coverage
          if-no-files-found: ignore
