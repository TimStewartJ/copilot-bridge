name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        shell: pwsh
        run: npm ci

      - name: Typecheck
        shell: pwsh
        run: npx tsc --noEmit

      - name: Cross-platform test audit
        shell: pwsh
        run: npm run test:xplat-audit

      - name: Build client
        shell: pwsh
        run: npx vite build

      - name: Run tests with coverage
        shell: pwsh
        run: npm run test:coverage
